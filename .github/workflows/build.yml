name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK with Buildozer
        uses: docker://kivy/buildozer
        with:
          args: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voicescore-apk
          path: bin/*.apk
