name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer
        run: |
          sudo apt update
          sudo apt install -y build-essential git zlib1g-dev python3-pip \
            openjdk-17-jdk-headless autoconf automake libtool libffi-dev \
            pkg-config zip unzip libltdl-dev
          pip install buildozer cython

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voicescore-apk
          path: bin/*.apk
