name: Build APKon:  push:    branches: [main, master]  workflow_dispatch:jobs:  build:    runs-on: ubuntu-latest    steps:      - name: Checkout        uses: actions/checkout@v4      - name: Build APK with Buildozer        run: |          docker run --rm \            -v ${{ github.workspace }}:/app \            -w /app \            kivy/buildozer bash -c "echo y | buildozer android debug"      - name: Upload APK        uses: actions/upload-artifact@v4        with:          name: voicescore-apk          path: bin/*.apk
